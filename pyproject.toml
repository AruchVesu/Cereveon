[tool.black]
line-length = 100
target-version = ["py313"]
# Exclude the pre-squash bare-archive directory at repo root.  CI runs
# Black via run_quality_gate.py with an explicit FORMAT_TARGETS
# whitelist, so this `extend-exclude` only affects bare `black .`
# invocations.  Historically this list also enumerated dormant SECA
# research subtrees (data/, planning/, world/, henm/, closed_loop/,
# optim/, evolution/, policy/, memory/) but the deletion sweeps in
# 2026-04…05 removed them entirely; the two paths that survived
# (`engines/` and `world_model/`) are now live SECA modules and SHOULD
# be linted, so they were also dropped from the exclude list.
extend-exclude = '''
^/(
    chesscoach-purge\.git
)/
'''

[tool.mypy]
python_version = "3.13"
ignore_missing_imports = true
warn_unused_configs = true
pretty = true
cache_dir = ".mypy_cache"

# Trust-boundary modules — every public function must be fully type-annotated
# AND every untyped function body must be deep-checked.  This is stricter than
# the global mypy config above (which is intentionally permissive across the
# rest of the typed surface to keep contributor velocity reasonable).  See
# README "Code-quality gates" for the full rationale and the global vs.
# per-package strictness split.
[[tool.mypy.overrides]]
module = [
  "llm.rag.validators.*",
  "llm.rag.safety.*",
  "llm.rag.contracts.*",
]
disallow_untyped_defs = true
check_untyped_defs = true
disallow_incomplete_defs = true
warn_return_any = true

[tool.pylint.main]
py-version = "3.13"
persistent = false

[tool.pylint."messages control"]
disable = [
  "broad-exception-caught",
  # Pylint mis-resolves ``from .x import y`` for this repo's package layout
  # (the run_quality_gate.py invocation runs pylint from the repo root, not
  # against an installed package).  At runtime the imports work via the
  # package init paths; the rule is silenced rather than restructuring every
  # SECA module to use absolute-only imports.
  "relative-beyond-top-level",
  # Sprint 6.B closure pass: most of these patterns are intentional in the
  # codebase (lazy imports for circular-dep avoidance, Pydantic schemas
  # defined alongside their routes, FastAPI `request: Request` args that
  # slowapi consumes even when the handler body doesn't reference them).
  # Disabling project-wide rather than scattering per-file pragmas:
  "import-outside-toplevel",
  "line-too-long",
  "missing-class-docstring",
  "missing-function-docstring",
  "missing-module-docstring",
  "raise-missing-from",
  "subprocess-run-check",
  "too-few-public-methods",
  "too-many-arguments",
  "too-many-branches",
  "too-many-instance-attributes",
  "too-many-locals",
  "too-many-positional-arguments",
  "too-many-statements",
  # Sprint 6.A follow-up (2026-05-12): skills/updater.py and events/router.py
  # share the post-event context-builder + bandit-action sequence in a way
  # that R0801 (duplicate-code) flags as ~11-line similarity.  The
  # duplication is intentional — events/router orchestrates the request
  # while skills/updater also runs the player-embedding update — and
  # refactoring to a shared helper would tangle the layers.
  "duplicate-code",
  "ungrouped-imports",
  "wrong-import-order",
  "wrong-import-position",
]

# ---------------------------------------------------------------------------
# Project policy: explicit ``raise`` over bare ``assert`` on production paths
# ---------------------------------------------------------------------------
# Validators and safety checks that run in the live coaching path MUST use
# explicit ``if not <cond>: raise AssertionError(<msg>)`` rather than a bare
# ``assert <cond>, <msg>``.  Reason: ``assert`` is stripped from the
# bytecode under ``python -O`` (and by some packaging tools that pass ``-O``
# to bytecode-compile steps), which would silently disable the gate in
# production.  The explicit raise preserves the same exception type so
# existing callers that ``except AssertionError`` keep working.
#
# Affected modules (current):
#   - llm/rag/validators/mode_2_negative.py  ::  validate_mode_2_negative
#
# Pinned by:
#   - llm/rag/tests/unit/test_validator_dash_o_hardening.py
#       (test ID VAL_DASH_O_01 — runs the validator under ``python -O``
#       in a subprocess and asserts AssertionError still fires for empty
#       input; if anyone reverts the explicit raise back to ``assert``,
#       the gate disappears under -O and the test rc=0 catches it).
#
# Pylint does not ship a checker that flags ``assert`` on production
# paths (bandit B101 does, but bandit is not part of this project's
# toolchain).  The policy is therefore enforced by code review + the
# regression test above; this comment block exists so contributors
# reading pyproject.toml understand the constraint.
[tool.pytest.ini_options]
markers = [
  "dash_o_hardening: validators / gates that must survive ``python -O`` (assert stripping); see [tool.pylint] policy block for rationale.",
]
