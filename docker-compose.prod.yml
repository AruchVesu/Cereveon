# Production stack for Hetzner VPS.
# Pull images built and signed by CI from GHCR — do not build on the server.
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#
# Required on the server:
#   - .env.prod (see .env.example, set SECA_ENV=prod + all required vars)
#   - DOMAIN env var exported in shell (e.g. export DOMAIN=api.yourdomain.com)
#   - GHCR_IMAGE env var, or edit the api.image line below
#
# Ollama model lifecycle:
#   The ``ollama`` service's entrypoint pulls ``$COACH_OLLAMA_MODEL``
#   on every container start (idempotent — a no-op when already
#   present).  The healthcheck only goes "healthy" once the model is
#   actually loaded, so ``api`` (which ``depends_on: ollama: condition:
#   service_healthy``) waits for the pull instead of starting against
#   a model-less Ollama.  See the ``ollama:`` block below for the
#   full rationale and the chat_pipeline.py:557 callsite that used to
#   silently mask "model not pulled" as deterministic-fallback replies.
#
#   Pin a specific tag in production by setting
#   ``COACH_OLLAMA_MODEL=qwen2.5:7b-instruct-q2_K@sha256:<digest>`` in
#   .env.prod so a re-pushed upstream tag cannot silently change the
#   served model under the LLM regression contract.  The entrypoint
#   strips the ``@sha256:...`` suffix before passing to ``ollama pull``;
#   the digest pin lives only in the api container's runtime config.

services:

  # TLS termination + reverse proxy. Provisions Let's Encrypt certs automatically.
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3 (QUIC)
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN:?DOMAIN env var must be set (e.g. api.yourdomain.com)}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # Python FastAPI backend. Image is built and pushed to GHCR by CI.
  api:
    image: ${GHCR_IMAGE:-ghcr.io/owner/cereveon-llm-api:latest}
    user: "10001:10001"
    expose:
      - "8000"
    env_file: .env.prod
    environment:
      # Ollama runs as a sibling container — reachable by service name.
      COACH_OLLAMA_URL: http://ollama:11434
      # Redis cache — comment out to fall back to in-memory.
      REDIS_URL: redis://redis:6379/0
    volumes:
      - api_data:/app/data
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
        "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=4)"]
      interval: 30s
      timeout: 5s
      start_period: 25s
      retries: 3
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # Postgres — use instead of SQLite for multi-worker deployments.
  # Set DATABASE_URL=postgresql://chesscoach:<password>@db:5432/chesscoach in .env.prod
  db:
    image: postgres:16-alpine
    volumes:
      - pg_data:/var/lib/postgresql/data
    env_file: .env.prod   # reads POSTGRES_DB, POSTGRES_USER, POSTGRES_PASSWORD
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 5
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # LLM inference — internal only, not exposed to the host.
  #
  # The entrypoint below replaces the previous "you have to remember
  # to ``ollama pull`` manually before first start" footgun.  Concrete
  # failure mode it closes: a deploy where the volume ``ollama_data``
  # is fresh (new VM, post-`docker volume rm`, or a CI rebuild that
  # forgets to mount the named volume) silently produces 200-OK
  # ``/chat`` responses with deterministic-fallback content because
  # the API container can reach Ollama but the model isn't loaded.
  # See chat_pipeline.py:557 — the LLM exception is caught and
  # falls back to a template reply, so external probes can't
  # distinguish "LLM healthy" from "LLM completely missing".
  #
  # Mechanism:
  #   1.  ``ollama serve`` runs in the background as PID 1's child.
  #   2.  We poll ``ollama list`` until the local API is up.
  #   3.  ``ollama pull <model>`` is idempotent — a no-op when the
  #       model is already present (exits 0 after a quick registry
  #       digest check).  Cheap to re-run on every restart and
  #       self-healing if ``ollama_data`` is ever wiped.
  #   4.  On pull failure (offline registry, transient DNS) we log
  #       the warning and keep ``ollama serve`` alive — the api
  #       container's deterministic fallback still gives users a
  #       reply, and the next restart will retry the pull.
  #   5.  ``wait`` blocks on the serve PID forever so the container
  #       stays alive.
  #
  # The healthcheck below was tightened in lockstep: instead of just
  # ``curl /`` (which passes as soon as ``ollama serve`` is up — well
  # before the model is loaded), we ``ollama list | grep`` for the
  # configured model.  ``api`` ``depends_on: ollama: condition:
  # service_healthy`` then correctly waits for the model to be
  # present, not just for Ollama's HTTP socket.
  #
  # ``start_period: 600s`` gives the first pull up to ten minutes
  # (Qwen 2.5 7B q2_K ≈ 2.7 GB; slow Hetzner links can need most of
  # that).  Subsequent restarts are instant — the model is on the
  # named volume.
  #
  # ``OLLAMA_AUTO_PULL_MODEL`` defaults to the same value
  # ``COACH_OLLAMA_MODEL`` already documents, but is exposed as its
  # own env so a Hetzner operator can pin a specific tag (with
  # @sha256:digest) without touching the API container's env.
  ollama:
    image: ollama/ollama
    expose:
      - "11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_AUTO_PULL_MODEL: ${COACH_OLLAMA_MODEL:-qwen2.5:7b-instruct-q2_K}
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        ollama serve &
        SERVE_PID=$$!
        until ollama list >/dev/null 2>&1; do sleep 1; done
        # Strip any @sha256:... digest suffix before pulling — Ollama's
        # `pull` accepts the bare tag, the digest pin lives only in
        # the api container's COACH_OLLAMA_MODEL for runtime safety.
        MODEL="$${OLLAMA_AUTO_PULL_MODEL%@*}"
        echo "[ollama-entrypoint] ensuring model present: $$MODEL"
        ollama pull "$$MODEL" || \
          echo "[ollama-entrypoint] WARN: pull failed; serving anyway, will retry on next restart"
        wait "$$SERVE_PID"
    healthcheck:
      test:
        - CMD-SHELL
        - 'MODEL="$${OLLAMA_AUTO_PULL_MODEL%@*}"; ollama list 2>/dev/null | tail -n +2 | grep -q "^$$MODEL"'
      interval: 15s
      timeout: 10s
      start_period: 600s
      retries: 5
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    # For GPU-enabled Hetzner instances, uncomment:
    # runtime: nvidia
    # environment:
    #   NVIDIA_VISIBLE_DEVICES: all

  # Redis — distributed move cache shared across all uvicorn workers.
  # No persistence: cache is warm-only; a restart causes cache misses, not data loss.
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  api_data:
  caddy_data:
  caddy_config:
  pg_data:
  ollama_data:
