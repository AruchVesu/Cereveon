# Production stack for Hetzner VPS.
# Pull images built and signed by CI from GHCR — do not build on the server.
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#
# Required on the server:
#   - .env.prod (see .env.example, set SECA_ENV=prod + all required vars
#     including COACH_DEEPSEEK_API_KEY for LLM coaching)
#   - DOMAIN env var exported in shell (e.g. export DOMAIN=api.yourdomain.com)
#   - GHCR_IMAGE env var, or edit the api.image line below
#
# LLM provider:
#   The api container reaches DeepSeek's chat-completions API directly
#   (https://api.deepseek.com/chat/completions) — no local Ollama
#   container.  This collapses what used to be a 4-service stack
#   (caddy + api + db + ollama) plus a model-pull dance into a
#   3-service stack with no LLM-side state on disk.  See
#   ``llm/explain_pipeline.py`` for the call site and
#   ``docs/DEPLOYMENT.md > LLM provider`` for the rationale (4 GB
#   Hetzner VPS could not run 7B inference reliably; DeepSeek-V3 at
#   ~$0.14 / $0.28 per million in/out tokens is cheaper and faster
#   than upgrading the box).
#
#   The deterministic-fallback path inside ``chat_pipeline.py`` and
#   ``live_move_pipeline.py`` still kicks in when DeepSeek is
#   unreachable (network blip, billing issue, key revoked) — coaching
#   never errors, just degrades to template responses for the duration.
#   ``GET /llm/health`` surfaces the live LLM status so you can detect
#   degraded mode without parsing chat replies.

services:

  # TLS termination + reverse proxy. Provisions Let's Encrypt certs automatically.
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3 (QUIC)
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN:?DOMAIN env var must be set (e.g. api.yourdomain.com)}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    # Conservative-tier hardening (CH_10).  Caddy binds privileged ports
    # 80/443 and chowns the cert volume on first boot — the deeper
    # read_only + cap_drop recipe needs staging validation per upstream
    # Caddy version.  no-new-privileges is the universal floor and has
    # zero functional impact; the aggressive-tier flags come in a
    # follow-up pass alongside docs/DEPLOYMENT.md > Container Hardening.
    security_opt:
      - "no-new-privileges:true"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # Python FastAPI backend. Image is built and pushed to GHCR by CI.
  #
  # Image resolution:
  #   - CI deploy steps always pass GHCR_IMAGE explicitly as the
  #     digest-pinned reference produced by the docker-images job.
  #   - Manual operator commands (`docker compose up`, recovery from
  #     a half-failed deploy) without GHCR_IMAGE fall back to
  #     :latest on the real GHCR namespace.  The fly-deploy.yml
  #     workflow tags every successful main build with :latest
  #     alongside :sha-<short> (see meta-api step), so the fallback
  #     is always a meaningful "deploy whatever just landed" target.
  #
  # The previous fallback used the literal placeholder
  # `ghcr.io/owner/cereveon-llm-api:latest`.  When pulled, GHCR
  # returned 404 (no such namespace) and `docker compose --force-recreate`
  # silently kept the local cached image — which on 2026-05-09 left
  # production briefly running an old build after a manual recovery.
  # Pinned by test_ci_pipeline.py::test_compose_fallback_targets_real_ghcr_namespace.
  api:
    image: ${GHCR_IMAGE:-ghcr.io/artiomgusev/cereveon-llm-api:latest}
    user: "10001:10001"
    expose:
      - "8000"
    env_file: .env.prod
    environment:
      # Redis cache — comment out to fall back to in-memory.
      REDIS_URL: redis://redis:6379/0
    volumes:
      - api_data:/app/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
        "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=4)"]
      interval: 30s
      timeout: 5s
      start_period: 25s
      retries: 3
    restart: unless-stopped
    # Aggressive-tier hardening (CH_01..CH_05).  Pinned by
    # llm/tests/test_container_hardening.py.
    #   - read_only locks the rootfs; everything Python writes goes
    #     either to the named volume at /app/data (SQLite) or to the
    #     tmpfs at /tmp (tempfile module, subprocess scratch, Stockfish
    #     UCI buffers).
    #   - PYTHONDONTWRITEBYTECODE=1 in the Dockerfile keeps .pyc writes
    #     out of site-packages, so read_only does not break import.
    #   - cap_drop ALL: the FastAPI process needs no Linux capabilities;
    #     uvicorn binds 8000 (unprivileged) and Stockfish is just a
    #     subprocess.
    #   - no-new-privileges blocks any future setuid binary shipped in
    #     the base image from being a privilege-escalation surface.
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - "no-new-privileges:true"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # Postgres — use instead of SQLite for multi-worker deployments.
  # Set DATABASE_URL=postgresql://chesscoach:<password>@db:5432/chesscoach in .env.prod
  db:
    image: postgres:16-alpine
    volumes:
      - pg_data:/var/lib/postgresql/data
    env_file: .env.prod   # reads POSTGRES_DB, POSTGRES_USER, POSTGRES_PASSWORD
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 5
    restart: unless-stopped
    # CH_11 carve-out: Postgres alpine ships a ``gosu``-based entrypoint
    # that runs as root and setuid-drops to the postgres user on first
    # start.  ``no-new-privileges:true`` blocks setuid, the entrypoint
    # cannot drop privileges, postgres refuses to run as root, and the
    # container exits ~1 second after Started — failing the Hetzner
    # rolling deploy with ``dependency db failed to start: container
    # chesscoach-db-1 is unhealthy``.  Restoring the conservative tier
    # to *no* hardening here is the correct posture until the
    # ``user: "70:70"`` (alpine postgres UID) + ``pg_data`` volume
    # ownership migration is validated in staging.  CH_11 + CH_13 in
    # ``llm/tests/test_container_hardening.py`` carry matching
    # carve-outs that document the exception.
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # Redis — distributed move cache shared across all uvicorn workers.
  # No persistence: cache is warm-only; a restart causes cache misses, not data loss.
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3
    restart: unless-stopped
    # Aggressive-tier hardening (CH_06..CH_09).  Persistence is disabled
    # (--save '' --appendonly no) so /data is never written; read_only
    # locks the rootfs and the tmpfs at /tmp covers redis-cli scratch.
    # cap_drop ALL is safe — the in-memory data plane needs no Linux
    # capabilities at all.
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - "no-new-privileges:true"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  api_data:
  caddy_data:
  caddy_config:
  pg_data:
