services:
  api:
    build:
      context: .
      dockerfile: llm/Dockerfile.api
    user: "10001:10001"
    environment:
      SECA_ENV: ${SECA_ENV:-dev}
      SECA_API_KEY: ${SECA_API_KEY:-dev-key}
      SECRET_KEY: ${SECRET_KEY:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      DATABASE_URL: ${DATABASE_URL:-sqlite:///data/seca.db}
      COACH_OLLAMA_URL: ${COACH_OLLAMA_URL:-http://host.docker.internal:11434}
      COACH_OLLAMA_MODEL: ${COACH_OLLAMA_MODEL:-qwen2.5:7b-instruct-q2_K}
      STOCKFISH_PATH: ${STOCKFISH_PATH:-/usr/games/stockfish}
      REDIS_URL: ${REDIS_URL:-}
    ports:
      - "8000:8000"
    volumes:
      - api_data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  api_data:
