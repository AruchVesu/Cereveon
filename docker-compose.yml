services:
  api:
    build:
      context: .
      dockerfile: llm/Dockerfile.api
    user: "10001:10001"
    environment:
      SECA_ENV: ${SECA_ENV:-dev}
      SECA_API_KEY: ${SECA_API_KEY:-dev-key}
      SECRET_KEY: ${SECRET_KEY:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      DATABASE_URL: ${DATABASE_URL:-sqlite:///data/seca.db}
      # LLM provider: DeepSeek (https://api.deepseek.com).  Set
      # COACH_DEEPSEEK_API_KEY in your shell or .env so the container
      # inherits it.  COACH_DEEPSEEK_API_BASE / COACH_DEEPSEEK_MODEL
      # default to https://api.deepseek.com / deepseek-chat and
      # rarely need overriding.
      COACH_DEEPSEEK_API_KEY: ${COACH_DEEPSEEK_API_KEY:-}
      COACH_DEEPSEEK_API_BASE: ${COACH_DEEPSEEK_API_BASE:-https://api.deepseek.com}
      COACH_DEEPSEEK_MODEL: ${COACH_DEEPSEEK_MODEL:-deepseek-chat}
      STOCKFISH_PATH: ${STOCKFISH_PATH:-/usr/games/stockfish}
      REDIS_URL: ${REDIS_URL:-}
    ports:
      - "8000:8000"
    volumes:
      - api_data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  api_data:
