# Weekly LLM regression — scheduled counterpart to fly-deploy.yml's tag-only
# `llm-regression` job.
#
# docs/TESTING.md "LLM Regression Test Frequency" requires regression tests to
# run before every release.  The tag-pushed CI job in fly-deploy.yml satisfies
# the strict release rule; this scheduled run catches model drift between
# releases by exercising the real DeepSeek API against the contract validators
# and publishing the JSONL telemetry as an artifact for review.
#
# Lives in its own workflow (not appended to fly-deploy.yml's `on:`) so the
# weekly trigger doesn't redundantly run image builds, Trivy scans, or the
# Hetzner/Fly deploy jobs.  workflow_dispatch is also wired so an oncall can
# rerun the suite ad-hoc without waiting for the cron.
name: LLM regression (weekly)

on:
  schedule:
    # Monday 04:17 UTC — staggered off the top of the hour to avoid GHA
    # queue spikes; distinct from the nightly android-instrumented cron
    # (03:00 UTC) so the two never compete for self-hosted resources.
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: llm-regression-weekly
  cancel-in-progress: false

jobs:
  llm-regression:
    name: Real-LLM regression (DeepSeek)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # GitHub Actions disallows ``secrets.X`` directly in step-level
    # ``if:`` expressions (it would create a side-channel oracle for
    # whether a secret exists), so the secret-presence check is
    # surfaced via a job-level ``env:`` and read as ``env.HAS_*`` in
    # the steps below.  Same pattern as the tag-only counterpart in
    # ``.github/workflows/fly-deploy.yml``.
    env:
      HAS_DEEPSEEK_KEY: ${{ secrets.COACH_DEEPSEEK_API_KEY != '' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            llm/requirements.txt
            llm/requirements-ci.txt
            pyproject.toml

      - name: Install CI dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r llm/requirements-ci.txt

      - name: Skip if COACH_DEEPSEEK_API_KEY is unset
        if: env.HAS_DEEPSEEK_KEY != 'true'
        run: |
          echo "::warning::COACH_DEEPSEEK_API_KEY secret is not set; skipping weekly LLM regression."
          echo "Set the secret in repo Settings → Secrets and variables → Actions to enable."

      - name: Run LLM regression tests (Category D)
        if: env.HAS_DEEPSEEK_KEY == 'true'
        env:
          RUN_DEEPSEEK_TESTS: "1"
          COACH_DEEPSEEK_API_KEY: ${{ secrets.COACH_DEEPSEEK_API_KEY }}
        run: python -m pytest -q llm/rag/tests/llm/test_llm_regression.py

      - name: Run DeepSeek smoke test (Category C)
        if: env.HAS_DEEPSEEK_KEY == 'true'
        env:
          RUN_DEEPSEEK_TESTS: "1"
          COACH_DEEPSEEK_API_KEY: ${{ secrets.COACH_DEEPSEEK_API_KEY }}
        run: python -m pytest -q llm/rag/tests/llm/test_deepseek_smoke.py

      # Per-call quality-score telemetry was previously uploaded as an
      # artifact here, but the writer (``llm/rag/telemetry/quality.py::
      # record_quality_score``) had no callers — the file the workflow
      # uploaded was always empty.  Retired in PR 13 (2026-05-15)
      # alongside the writer + consumer + the THREAT_MODEL § T4 and
      # OPERATIONS_RETRIES § A6 doc claims it supported.  When the
      # retry-tracking telemetry is actually wired, restore the upload
      # step alongside the writer.
