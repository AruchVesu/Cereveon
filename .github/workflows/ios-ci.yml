name: iOS CI

on:
  push:
    paths:
      - 'ios/**'
      - '.github/workflows/ios-ci.yml'
  pull_request:
    paths:
      - 'ios/**'
      - '.github/workflows/ios-ci.yml'

concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & test (iOS Simulator)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      # XcodeGen (latest, via brew) emits the Xcode 16 project format
      # (objectVersion 77), so the Xcode that reads it must be >= 16.
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.4'

      - name: Toolchain info
        run: |
          xcodebuild -version
          xcrun simctl list devices available | grep -E 'iPhone' || true

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Build & test
        working-directory: ios
        run: |
          set -o pipefail
          # Pick whatever iPhone simulator the runner actually has (device
          # names/OS versions drift across Xcode images); fall back to any iOS
          # simulator if no iPhone is present.
          DEVICE_ID=$(xcrun simctl list devices available -j \
            | jq -r '[.devices | to_entries[] | .value[] | select(.name|startswith("iPhone"))][0].udid // empty')
          if [ -z "$DEVICE_ID" ]; then
            DEVICE_ID=$(xcrun simctl list devices available -j \
              | jq -r '[.devices | to_entries[] | .value[]][0].udid // empty')
          fi
          echo "Using simulator UDID: ${DEVICE_ID:?no available iOS simulator found}"
          xcodebuild \
            -project Cereveon.xcodeproj \
            -scheme Cereveon \
            -destination "platform=iOS Simulator,id=$DEVICE_ID" \
            -resultBundlePath TestResults.xcresult \
            -derivedDataPath build \
            clean build test

      # Export the just-built iOS Simulator app so it can be run interactively in
      # a browser via Appetize.io — the no-Mac/no-iPhone validation path. ditto
      # preserves the bundle (symlinks + exec bit) and zips it with the
      # `Cereveon.app` wrapper at the zip root, the shape Appetize expects.
      - name: Package simulator app for Appetize
        working-directory: ios
        run: |
          set -euo pipefail
          APP=$(find build/Build/Products/Debug-iphonesimulator -maxdepth 1 -name 'Cereveon.app' -type d | head -1)
          echo "Built app bundle: ${APP:?Cereveon.app not found under DerivedData}"
          ditto -c -k --sequesterRsrc --keepParent "$APP" Cereveon-Simulator.zip
          ls -lh Cereveon-Simulator.zip

      - name: Upload simulator app artifact
        uses: actions/upload-artifact@v4
        with:
          name: cereveon-ios-simulator-app
          path: ios/Cereveon-Simulator.zip
          retention-days: 14
          if-no-files-found: error
