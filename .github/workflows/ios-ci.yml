name: iOS CI

on:
  push:
    paths:
      - 'ios/**'
      - '.github/workflows/ios-ci.yml'
  pull_request:
    paths:
      - 'ios/**'
      - '.github/workflows/ios-ci.yml'

concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & test (iOS Simulator)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      # XcodeGen (latest, via brew) emits the Xcode 16 project format
      # (objectVersion 77), so the Xcode that reads it must be >= 16.
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.4'

      - name: Toolchain info
        run: |
          xcodebuild -version
          xcrun simctl list devices available | grep -E 'iPhone' || true

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Build & test
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild \
            -project Cereveon.xcodeproj \
            -scheme Cereveon \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            -resultBundlePath TestResults.xcresult \
            clean build test
