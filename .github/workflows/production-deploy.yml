name: Production Deploy

# Manual re-deploy — for hotfixes, rollbacks to a specific digest, or
# re-deploying a previously-built image without triggering a full CI run.
#
# Automatic deploys are handled by fly-deploy.yml, which gates on all quality
# and security checks before deploying.  Use this workflow only when you need
# to deploy a specific, already-published image digest outside of that flow.
#
# How to find the api_digest:
#   GitHub → Actions → CI/CD → <run> → docker-images job →
#   "Build llm API image" step → digest output  (sha256:...)
#   OR: GHCR → cereveon-llm-api → <tag> → Digest field
#
# The concurrency group is identical to fly-deploy.yml's deploy job, so this
# workflow and the automatic pipeline can never run simultaneously.

on:
  workflow_dispatch:
    inputs:
      api_digest:
        description: "API image digest (sha256:…)"
        required: true
        type: string
      image_owner:
        description: "Lowercase GHCR owner (leave blank → repo owner)"
        required: false
        type: string

concurrency:
  group: hetzner-production
  cancel-in-progress: false

env:
  API_IMAGE_NAME: cereveon-llm-api

jobs:
  validate:
    name: Validate inputs
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Validate digest format
        shell: bash
        env:
          INPUT_DIGEST: ${{ inputs.api_digest }}
        run: |
          if [[ ! "$INPUT_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "::error::api_digest must be a sha256 digest (sha256:<64 hex chars>). Got: $INPUT_DIGEST"
            exit 1
          fi
          echo "Digest format valid: $INPUT_DIGEST"

  deploy:
    name: Deploy to Hetzner
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [validate]
    permissions:
      contents: read
    environment:
      name: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      # Normalise owner to lowercase and combine with the pinned digest.
      # DEPLOY_IMAGE is the full, immutable image reference passed to the server.
      - name: Resolve deploy image reference
        id: image
        shell: bash
        env:
          INPUT_OWNER: ${{ inputs.image_owner }}
          INPUT_DIGEST: ${{ inputs.api_digest }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          OWNER=$(echo "${INPUT_OWNER:-$REPO_OWNER}" | tr '[:upper:]' '[:lower:]')
          REF="ghcr.io/$OWNER/${{ env.API_IMAGE_NAME }}@$INPUT_DIGEST"
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "Resolved deploy image: $REF"

      - name: Check Hetzner secrets availability
        id: hetzner-check
        shell: bash
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
        run: |
          if [ -z "${HETZNER_HOST}" ] || [ -z "${HETZNER_SSH_KEY}" ]; then
            echo "::warning::HETZNER_HOST or HETZNER_SSH_KEY not configured. Skipping deploy."
            echo "available=false" >> "$GITHUB_OUTPUT"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      # Sync deploy-time configs from the checked-out commit before the
      # SSH step runs `docker compose up`.  Mirrors the same step in
      # fly-deploy.yml so a manual hotfix deploy lands the same compose
      # topology as the automatic CI deploy.  See the long comment in
      # fly-deploy.yml for the rationale (PR #65 ollama-resurrection
      # incident, 2026-05-08).
      - name: Sync compose file and Caddyfile to Hetzner
        if: steps.hetzner-check.outputs.available == 'true'
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: deploy
          key: ${{ secrets.HETZNER_SSH_KEY }}
          source: "docker-compose.prod.yml,Caddyfile"
          target: "/opt/chesscoach"
          overwrite: true

      # Stop-and-replace deploy — identical strategy to fly-deploy.yml.
      # See the long comment in fly-deploy.yml for the trade-off rationale
      # (4 GB box can't host two api containers in parallel; brief 502s
      # during swap accepted in exchange for not OOMing the host).
      - name: Deploy to Hetzner via SSH
        if: steps.hetzner-check.outputs.available == 'true'
        uses: appleboy/ssh-action@v1.2.5
        env:
          DEPLOY_IMAGE: ${{ steps.image.outputs.ref }}
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: deploy
          key: ${{ secrets.HETZNER_SSH_KEY }}
          envs: DEPLOY_IMAGE
          script: |
            set -euo pipefail
            cd /opt/chesscoach

            # ── 1. Record running container's image for rollback ────────────
            PREV_CONTAINER=$(docker compose -f docker-compose.prod.yml ps -q api 2>/dev/null | head -1 || true)
            PREV_IMAGE=$([ -n "$PREV_CONTAINER" ] && \
              docker inspect --format='{{.Config.Image}}' "$PREV_CONTAINER" 2>/dev/null || true)
            echo "Previous: ${PREV_IMAGE:-none}"
            echo "Deploying: $DEPLOY_IMAGE"

            # ── 2. Pull pinned, CI-signed image by digest ───────────────────
            docker pull "$DEPLOY_IMAGE"

            # ── 3. Stop-and-replace: tear down old api, bring up new ────────
            GHCR_IMAGE="$DEPLOY_IMAGE" \
              docker compose -f docker-compose.prod.yml up -d --force-recreate api

            # ── 4. Identify the new container ───────────────────────────────
            NEW_CONTAINER=$(docker compose -f docker-compose.prod.yml ps -q api | head -1 || true)
            if [ -z "$NEW_CONTAINER" ]; then
              echo "::error::No api container present after --force-recreate."
              exit 1
            fi
            echo "New container: $NEW_CONTAINER"

            # ── 5. Wait up to 90 s for Docker healthcheck on new container ──
            for i in $(seq 1 18); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' "$NEW_CONTAINER" 2>/dev/null || echo "unknown")
              [ "$STATUS" = "healthy" ] && break
              echo "  Health.Status: $STATUS ($i/18)"
              sleep 5
            done
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' "$NEW_CONTAINER" 2>/dev/null || echo "failed")

            # ── 6a. Healthy: deploy done ────────────────────────────────────
            if [ "$STATUS" = "healthy" ]; then
              echo "Deployment complete."
              # Prune stale unused images — see the long comment in
              # fly-deploy.yml's deploy step for rationale.  Same shape:
              # --filter until=72h keeps the previous deploy's image for
              # quick rollback; -af removes everything else not in use;
              # `|| true` keeps a transient docker hiccup from failing
              # an otherwise-healthy hotfix deploy.
              docker image prune -af --filter "until=72h" || true
              exit 0
            fi

            # ── 6b. Unhealthy: roll back to the previous image ──────────────
            echo "::error::New container unhealthy ($STATUS). Rolling back to ${PREV_IMAGE:-(none)}..."
            if [ -n "${PREV_IMAGE:-}" ]; then
              GHCR_IMAGE="$PREV_IMAGE" \
                docker compose -f docker-compose.prod.yml up -d --force-recreate api
              echo "Rolled back to $PREV_IMAGE."
            else
              echo "::error::No previous image recorded; cannot auto-roll-back.  Investigate manually."
            fi
            exit 1
