# Android instrumented (connectedAndroidTest) suite — nightly CI.
#
# What this covers that the host-JVM job in fly-deploy.yml does NOT:
#
#   - JNI bridge:   ChessNativeInstrumentedTest exercises libchessengine.so
#                   on a real Android runtime; host-JVM tests skip when the
#                   .so cannot be loaded (NativeEngineProvider returns null).
#   - AAPT2 / theme attributes / drawable resolution: AtriumLayoutInflationTest
#                   inflates real layouts under a real Android theme stack;
#                   catches link errors that pass type-check but blow up at
#                   runtime on device.
#
# Why nightly (not on every push):
#   connectedAndroidTest takes 15-30 minutes (boot + Gradle + tests).  Adding
#   it to the per-push pipeline would dominate PR latency.  Nightly is enough
#   to surface regressions within a working day; workflow_dispatch lets a
#   developer trigger an ad-hoc run when iterating on JNI / theme code.
#
# Mirrors scripts/run_connected_android_tests.sh which runs the same suite
# locally — see docs/TESTING.md §"Android Instrumented Tests".

name: Android instrumented (nightly)

on:
  schedule:
    # 03:00 UTC daily — quiet hours, results visible at the start of the
    # European workday.  Adjust if collaborators in other zones need it
    # earlier.
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-instrumented
  cancel-in-progress: false

jobs:
  connected-tests:
    name: connectedAndroidTest on emulator
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      GRADLE_USER_HOME: ${{ github.workspace }}/.gradle
      ANDROID_USER_HOME: ${{ github.workspace }}/.android
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      # KVM hardware acceleration cuts emulator boot time from ~5 min to <60 s.
      # GitHub-hosted Ubuntu runners support KVM but the kvm device node is
      # owned by root by default — the udev rule below makes it world-writable
      # so the runner user can open /dev/kvm without sudo.
      - name: Enable KVM
        shell: bash
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      # Cache the AVD + system image so subsequent runs reuse the cold-boot
      # snapshot.  Cuts ~3 min off every run after the first.
      - name: AVD cache
        id: avd-cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-android-36-x86_64-google_apis-pixel5

      # First run only: create the AVD, boot once, save the snapshot.  This
      # is a one-off cost per cache key — it then stays warm for subsequent
      # runs (until the cache is rotated by the key changing).
      - name: Create AVD and snapshot (cache miss only)
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 36
          target: google_apis
          arch: x86_64
          profile: pixel_5
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot-load
          disable-animations: false
          script: echo "AVD snapshot generated for cache."

      # The actual test run.  -no-snapshot-save preserves the cached snapshot
      # exactly as it was; if a flaky test corrupts state, the next run still
      # starts from the same clean baseline.
      - name: Run connectedAndroidTest
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 36
          target: google_apis
          arch: x86_64
          profile: pixel_5
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot-save
          disable-animations: true
          working-directory: android
          script: ./gradlew :app:connectedAndroidTest --no-daemon

      # Always upload the HTML test report so a failed nightly run is
      # debuggable from the GitHub Actions UI without re-running locally.
      - name: Upload HTML test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: connected-test-html-${{ github.run_id }}
          path: android/app/build/reports/androidTests/connected/
          if-no-files-found: warn

      # The XML JUnit results are the machine-readable equivalent — useful
      # for downstream test-results aggregators if/when one is wired up.
      - name: Upload XML test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: connected-test-xml-${{ github.run_id }}
          path: android/app/build/outputs/androidTest-results/connected/
          if-no-files-found: warn
