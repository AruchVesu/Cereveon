name: Android Build and Test
on:
  push:
    branches: [ "main", "master" ] # Run on push to these branches
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: read

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GRADLE_USER_HOME: ${{ github.workspace }}/.gradle
      ANDROID_USER_HOME: ${{ github.workspace }}/.android
    steps:
      # 1. Download the repository code
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      # 2. Set up Java (needed for Android build)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. Grant execute permission for Gradle (important for Linux servers)
      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      # 4. Install the Android SDK and required platform
      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK platform 36
        run: sdkmanager "platforms;android-36"

      # 5. Run host JVM unit tests — any regression fails the build
      - name: Run Android host JVM unit tests
        working-directory: android
        run: ./gradlew test --no-daemon

      # 6. Upload test reports (always, so failures are visible)
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-reports-${{ github.sha }}
          path: android/app/build/reports/tests/

      # 7. Validate packaged manifests for both build types
      - name: Generate and validate packaged manifests
        working-directory: android
        run: ./gradlew processDebugManifestForPackage processReleaseManifestForPackage --no-daemon

      - name: Verify packaged manifest includes INTERNET permission
        shell: bash
        run: |
          debug_manifest="android/app/build/intermediates/packaged_manifests/debug/processDebugManifestForPackage/AndroidManifest.xml"
          release_manifest="android/app/build/intermediates/packaged_manifests/release/processReleaseManifestForPackage/AndroidManifest.xml"
          for manifest in "$debug_manifest" "$release_manifest"; do
            test -f "$manifest"
            grep -q 'android.permission.INTERNET' "$manifest"
          done

      # 8. Decode the base64-encoded keystore secret into a temp file.
      #    Skipped on PRs: signing is only needed for the artefact produced on push.
      - name: Decode release keystore
        if: github.event_name == 'push'
        id: keystore
        shell: bash
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/release.jks"
            echo "path=$RUNNER_TEMP/release.jks" >> "$GITHUB_OUTPUT"
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      # 9. Append signing properties to gradle.properties so Gradle picks them up
      #    via findProperty(). Skipped when keystore was not decoded.
      - name: Write signing properties
        if: steps.keystore.outputs.available == 'true'
        shell: bash
        env:
          SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          {
            echo "MYAPP_UPLOAD_STORE_FILE=${{ steps.keystore.outputs.path }}"
            echo "MYAPP_UPLOAD_KEY_ALIAS=$SIGNING_KEY_ALIAS"
            echo "MYAPP_UPLOAD_KEY_PASSWORD=$SIGNING_KEY_PASSWORD"
            echo "MYAPP_UPLOAD_STORE_PASSWORD=$SIGNING_STORE_PASSWORD"
          } >> android/gradle.properties

      # 10. Build the release APK.
      #     PR builds use dev defaults (no secrets exposed to PR runners).
      #     Push builds inject COACH_API_KEY for the production artefact.
      - name: Build release APK (PR)
        if: github.event_name == 'pull_request'
        working-directory: android
        env:
          COACH_API_BASE: ${{ vars.COACH_API_BASE }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Build release APK (push)
        if: github.event_name == 'push'
        working-directory: android
        env:
          COACH_API_BASE: ${{ vars.COACH_API_BASE }}
          COACH_API_KEY: ${{ secrets.COACH_API_KEY }}
        run: ./gradlew assembleRelease --no-daemon

      # 11. Upload the APK on push so it is available as a build artifact.
      #     Signed builds produce app-release.apk; unsigned fallback produces
      #     app-release-unsigned.apk. The glob captures whichever is present.
      - name: Upload release APK
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-${{ github.sha }}
          path: android/app/build/outputs/apk/release/app-release*.apk
          if-no-files-found: warn
