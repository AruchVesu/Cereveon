# CI/CD pipeline for ChessCoach.
#
# Despite the historical filename, this workflow deploys to TWO production
# tiers built from this monorepo:
#
#   1. Hetzner heavy backend  — `cereveon-llm-api` image (Python
#      FastAPI + Stockfish + full SECA pipeline, port 8000).  Updated by
#      the `deploy` job below via SSH + docker compose.
#   2. Fly.io edge            — `cereveon` image (Node.js Express
#      front, port 3000, global regional distribution).  Updated by the
#      `fly-deploy` job below via flyctl, sequenced after Hetzner so the
#      backend's new contract is live before the edge calls it.
#
# See docs/DEPLOYMENT.md for the topology + how each tier gets its
# secrets.  The workflow's filename is preserved for URL stability across
# external bookmarks; the workflow's `name:` field (CI/CD) is the
# authoritative description.
name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

env:
  APP_IMAGE_NAME: cereveon
  API_IMAGE_NAME: cereveon-llm-api

concurrency:
  group: ci-cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  workflow-lint:
    name: actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Lint GitHub Actions workflows
        uses: raven-actions/actionlint@v2

  python-tests:
    name: Python tests and coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            llm/requirements.txt
            llm/requirements-ci.txt
            pyproject.toml

      - name: Install CI dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r llm/requirements-ci.txt

      - name: Run golden tests (Category A — mandatory)
        run: python -m pytest -q llm/rag/tests/golden/test_retriever.py llm/rag/tests/golden/test_prompt_snapshot.py

      - name: Run LLM contract tests (Category B — mandatory)
        run: python -m pytest -q llm/rag/tests/contracts/test_fake_llm.py

      - name: Run validator violations corpus (Category B — mandatory)
        run: python -m pytest -q llm/rag/tests/contracts/test_violations_corpus.py

      - name: Run API contract validation
        run: python -m pytest -q llm/tests/test_api_contract_validation.py

      - name: Run coaching pipeline regression tests
        run: python -m pytest -q llm/tests/test_coaching_pipeline_regression.py

      - name: Run explain schema validation tests
        run: python -m pytest -q llm/tests/test_explain_schema_validation.py

      - name: Run engine regression tests
        run: |
          python -m pytest -q --tb=short \
            llm/tests/test_engine_response_format.py \
            llm/tests/test_engine_eval_lru_cache.py \
            llm/tests/test_engine_eval_limits.py \
            llm/tests/test_engine_eval_benchmark.py \
            llm/tests/test_engine_eval_fallback_cache.py \
            llm/tests/test_stockfish_adapter_isolation.py \
            llm/tests/test_elite_engine_service.py \
            llm/tests/test_elite_engine_service_resolve_limits.py

      - name: Run API security tests
        run: python -m pytest -q --tb=short llm/tests/test_api_security.py

      - name: Run regression pipeline
        run: python llm/run_regression_suite.py

      - name: Run pytest suite with coverage
        run: python llm/run_ci_suite.py

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-test-artifacts
          path: |
            tmp_logs/coverage.xml
            tmp_logs/pytest-ci.xml

  python-quality:
    name: Black, Pylint, and Mypy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            llm/requirements.txt
            llm/requirements-ci.txt
            pyproject.toml

      - name: Install quality dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r llm/requirements-ci.txt

      - name: Run Black
        run: python llm/run_quality_gate.py black

      - name: Run Pylint
        run: python llm/run_quality_gate.py pylint

      - name: Run Mypy
        run: python llm/run_quality_gate.py mypy

  dependency-security:
    name: Python dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            llm/requirements.txt
            llm/requirements-ci.txt

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit==2.8.0

      - name: Audit runtime dependencies
        run: python -m pip_audit -r llm/requirements.txt --strict --progress-spinner off

      - name: Audit CI/toolchain dependencies
        run: python -m pip_audit -r llm/requirements-ci.txt --strict --progress-spinner off

  node-security:
    name: Node dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate package lock for audit
        working-directory: llm
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Audit Node dependencies
        working-directory: llm
        run: npm audit --omit=dev --audit-level=high

  android-build:
    name: Android build and unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      GRADLE_USER_HOME: ${{ github.workspace }}/.gradle
      ANDROID_USER_HOME: ${{ github.workspace }}/.android
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK platform 36
        run: sdkmanager "platforms;android-36"

      - name: Run Android host JVM unit tests
        working-directory: android
        run: ./gradlew test --no-daemon

      - name: Generate and validate packaged manifests
        working-directory: android
        run: ./gradlew processDebugManifestForPackage processReleaseManifestForPackage --no-daemon

      - name: Verify packaged manifest includes INTERNET permission
        shell: bash
        run: |
          debug_manifest="android/app/build/intermediates/packaged_manifests/debug/processDebugManifestForPackage/AndroidManifest.xml"
          release_manifest="android/app/build/intermediates/packaged_manifests/release/processReleaseManifestForPackage/AndroidManifest.xml"
          for manifest in "$debug_manifest" "$release_manifest"; do
            test -f "$manifest"
            grep -q 'android.permission.INTERNET' "$manifest"
          done

      # Decode the base64-encoded keystore secret into a temp file.
      # Skipped on PRs: signing is only needed for the artefact produced on push.
      - name: Decode release keystore
        if: github.event_name == 'push'
        id: keystore
        shell: bash
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/release.jks"
            echo "path=$RUNNER_TEMP/release.jks" >> "$GITHUB_OUTPUT"
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      # Append signing properties to gradle.properties so Gradle picks them up
      # via findProperty(). Secrets are passed as env vars (GitHub masks them in
      # logs); the keystore path is a derived value, not a secret.
      # Skipped entirely when the keystore was not decoded (no KEYSTORE_BASE64).
      - name: Write signing properties
        if: steps.keystore.outputs.available == 'true'
        shell: bash
        env:
          SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          {
            echo "MYAPP_UPLOAD_STORE_FILE=${{ steps.keystore.outputs.path }}"
            echo "MYAPP_UPLOAD_KEY_ALIAS=$SIGNING_KEY_ALIAS"
            echo "MYAPP_UPLOAD_KEY_PASSWORD=$SIGNING_KEY_PASSWORD"
            echo "MYAPP_UPLOAD_STORE_PASSWORD=$SIGNING_STORE_PASSWORD"
          } >> android/gradle.properties

      # COACH_API_BASE is a plain URL (visible in the APK — not a secret).
      # PR builds use dev defaults (no secrets exposed to PR runners).
      # Push builds inject COACH_API_KEY for the production artefact.
      - name: Build release APK (PR)
        if: github.event_name == 'pull_request'
        working-directory: android
        env:
          COACH_API_BASE: ${{ vars.COACH_API_BASE }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Build release APK (push)
        if: github.event_name == 'push'
        working-directory: android
        env:
          COACH_API_BASE: ${{ vars.COACH_API_BASE }}
          COACH_API_KEY: ${{ secrets.COACH_API_KEY }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload release APK
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-${{ github.sha }}
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          if-no-files-found: warn

  compose-validate:
    name: Validate Compose files and Caddyfile
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Validate docker-compose.yml syntax
        run: docker compose config --quiet

      - name: Validate docker-compose.prod.yml syntax
        env:
          DOMAIN: test.example.com
          GHCR_IMAGE: ghcr.io/owner/test:latest
        run: |
          printf '%s\n' \
            'POSTGRES_DB=chesscoach' \
            'POSTGRES_USER=chesscoach' \
            'POSTGRES_PASSWORD=stub' \
            'SECA_ENV=prod' \
            'SECA_API_KEY=stub' \
            'SECRET_KEY=stub' \
            'CORS_ALLOWED_ORIGINS=https://test.example.com' \
            'DATABASE_URL=sqlite:///data/seca.db' \
            'COACH_OLLAMA_MODEL=qwen2.5:7b-instruct-q2_K' \
            > .env.prod
          docker compose -f docker-compose.prod.yml config --quiet

      - name: Validate Caddyfile syntax
        run: |
          docker run --rm \
            -e DOMAIN=test.example.com \
            -v "$GITHUB_WORKSPACE/Caddyfile:/etc/caddy/Caddyfile:ro" \
            caddy:2-alpine \
            caddy adapt --config /etc/caddy/Caddyfile --adapter caddyfile > /dev/null

  docker-images:
    name: Build and publish Docker images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - workflow-lint
      - python-tests
      - python-quality
      - dependency-security
      - node-security
      - android-build
      - compose-validate
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      image_owner: ${{ steps.prep.outputs.owner }}
      app_digest: ${{ steps.build-app.outputs.digest }}
      api_digest: ${{ steps.build-api.outputs.digest }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Normalize image owner
        id: prep
        shell: bash
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata for app image
        id: meta-app
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.prep.outputs.owner }}/${{ env.APP_IMAGE_NAME }}
          tags: |
            type=sha,format=short,prefix=sha-
            type=ref,event=branch
            type=ref,event=pr,prefix=pr-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=true

      - name: Docker metadata for llm API image
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.prep.outputs.owner }}/${{ env.API_IMAGE_NAME }}
          tags: |
            type=sha,format=short,prefix=sha-
            type=ref,event=branch
            type=ref,event=pr,prefix=pr-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=true

      - name: Build app image
        id: build-app
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta-app.outputs.tags }}
          labels: ${{ steps.meta-app.outputs.labels }}
          cache-from: type=gha,scope=app-image
          cache-to: type=gha,mode=max,scope=app-image
          provenance: false
          sbom: false
          build-args: BUILDDATE=${{ github.run_id }}

      - name: Build llm API image
        id: build-api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./llm/Dockerfile.api
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha,scope=llm-api-image
          cache-to: type=gha,mode=max,scope=llm-api-image
          provenance: false
          sbom: false
          build-args: BUILDDATE=${{ github.run_id }}

      - name: Attest app image provenance
        if: github.event_name == 'push'
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ steps.prep.outputs.owner }}/${{ env.APP_IMAGE_NAME }}
          subject-digest: ${{ steps.build-app.outputs.digest }}
          push-to-registry: true

      - name: Attest llm API image provenance
        if: github.event_name == 'push'
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ steps.prep.outputs.owner }}/${{ env.API_IMAGE_NAME }}
          subject-digest: ${{ steps.build-api.outputs.digest }}
          push-to-registry: true

      - name: Install Cosign
        if: github.event_name == 'push'
        uses: sigstore/cosign-installer@v3

      - name: Sign published images
        if: github.event_name == 'push'
        shell: bash
        run: |
          cosign sign --yes "ghcr.io/${{ steps.prep.outputs.owner }}/${{ env.APP_IMAGE_NAME }}@${{ steps.build-app.outputs.digest }}"
          cosign sign --yes "ghcr.io/${{ steps.prep.outputs.owner }}/${{ env.API_IMAGE_NAME }}@${{ steps.build-api.outputs.digest }}"

  image-security:
    name: Trivy image scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - docker-images
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Trivy vulnerability DB
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}/trivy
          key: trivy-db-${{ runner.os }}-${{ github.run_id }}
          restore-keys: trivy-db-${{ runner.os }}-

      - name: Scan published app image
        id: trivy-app-image
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ghcr.io/${{ needs.docker-images.outputs.image_owner }}/${{ env.APP_IMAGE_NAME }}@${{ needs.docker-images.outputs.app_digest }}
          format: table
          scanners: vuln
          vuln-type: library
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "0"
          trivy-config: trivy.yaml
          trivyignores: .trivyignore
          ignore-policy: trivy-ignore-policy.rego
        env:
          TRIVY_CACHE_DIR: ${{ runner.temp }}/trivy
          TRIVY_TIMEOUT: "15m"
          TRIVY_USERNAME: ${{ github.repository_owner }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate app image SARIF
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ghcr.io/${{ needs.docker-images.outputs.image_owner }}/${{ env.APP_IMAGE_NAME }}@${{ needs.docker-images.outputs.app_digest }}
          format: sarif
          output: trivy-app-image.sarif
          scanners: vuln
          vuln-type: library
          severity: HIGH,CRITICAL
          ignore-unfixed: false
          exit-code: "0"
          trivy-config: trivy.yaml
          trivyignores: .trivyignore
          ignore-policy: trivy-ignore-policy.rego
        env:
          TRIVY_CACHE_DIR: ${{ runner.temp }}/trivy
          TRIVY_SKIP_DB_UPDATE: "true"
          TRIVY_TIMEOUT: "15m"
          TRIVY_USERNAME: ${{ github.repository_owner }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload app image scan results
        if: hashFiles('trivy-app-image.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-app-image.sarif
          category: trivy-app-image

      - name: Scan published llm API image
        id: trivy-api-image
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ghcr.io/${{ needs.docker-images.outputs.image_owner }}/${{ env.API_IMAGE_NAME }}@${{ needs.docker-images.outputs.api_digest }}
          format: table
          scanners: vuln
          vuln-type: os,library
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          trivy-config: trivy.yaml
          trivyignores: .trivyignore
          ignore-policy: trivy-ignore-policy.rego
        env:
          TRIVY_CACHE_DIR: ${{ runner.temp }}/trivy
          TRIVY_TIMEOUT: "15m"
          TRIVY_USERNAME: ${{ github.repository_owner }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate llm API image SARIF
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ghcr.io/${{ needs.docker-images.outputs.image_owner }}/${{ env.API_IMAGE_NAME }}@${{ needs.docker-images.outputs.api_digest }}
          format: sarif
          output: trivy-api-image.sarif
          scanners: vuln
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: false
          exit-code: "0"
          trivy-config: trivy.yaml
          trivyignores: .trivyignore
          ignore-policy: trivy-ignore-policy.rego
        env:
          TRIVY_CACHE_DIR: ${{ runner.temp }}/trivy
          TRIVY_SKIP_DB_UPDATE: "true"
          TRIVY_TIMEOUT: "15m"
          TRIVY_USERNAME: ${{ github.repository_owner }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload llm API image scan results
        if: hashFiles('trivy-api-image.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-api-image.sarif
          category: trivy-api-image


  deploy:
    name: Deploy to Hetzner
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - workflow-lint
      - python-tests
      - python-quality
      - dependency-security
      - node-security
      - docker-images
      - image-security
      - compose-validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    environment:
      name: production
    concurrency:
      group: hetzner-production
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Check Hetzner secrets availability
        id: hetzner-check
        shell: bash
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
        run: |
          if [ -z "${HETZNER_HOST}" ] || [ -z "${HETZNER_SSH_KEY}" ]; then
            echo "::warning::HETZNER_HOST or HETZNER_SSH_KEY not configured. Skipping Hetzner deploy."
            echo "available=false" >> "$GITHUB_OUTPUT"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      # Zero-downtime rolling deploy (blue/green-style via Docker Compose scale):
      #
      #  1. Record old container ID and image (rollback reference).
      #  2. Pull the exact digest produced by the docker-images job.
      #  3. --scale api=2 --no-recreate: start NEW container alongside old one.
      #     Caddy proxies to the "api" service name; Docker's internal DNS
      #     round-robins across all containers — both serve traffic immediately.
      #  4. Poll Docker's own healthcheck on the NEW container (not round-robin).
      #  5a. Healthy → gracefully drain old container (SIGTERM + 30 s), remove it.
      #      Traffic shifts entirely to the new container. Zero downtime.
      #  5b. Unhealthy → stop and remove new container. Old stays alive.
      #      Automatic rollback, no manual intervention required.
      - name: Deploy to Hetzner via SSH
        if: steps.hetzner-check.outputs.available == 'true'
        uses: appleboy/ssh-action@v1.2.5
        env:
          DEPLOY_IMAGE: ghcr.io/${{ needs.docker-images.outputs.image_owner }}/${{ env.API_IMAGE_NAME }}@${{ needs.docker-images.outputs.api_digest }}
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: deploy
          key: ${{ secrets.HETZNER_SSH_KEY }}
          envs: DEPLOY_IMAGE
          script: |
            set -euo pipefail
            cd /opt/chesscoach

            # ── 0. Pre-flight: verify required secrets are in .env.prod ───────
            #    The server crashes at module load (not health-check time) when
            #    SECRET_KEY is missing in prod, which causes a silent 90-second
            #    wait before the deploy rolls back.  Fail fast with a clear
            #    message instead.
            for _var in SECA_API_KEY SECRET_KEY SECA_ENV; do
              if ! grep -qE "^${_var}=.+" .env.prod 2>/dev/null; then
                echo "::error::Required variable ${_var} is missing or empty in /opt/chesscoach/.env.prod"
                echo "  Add it:  echo '${_var}=<value>' >> /opt/chesscoach/.env.prod"
                echo "  SECRET_KEY hint:  python3 -c \"import secrets; print(secrets.token_hex(32))\""
                exit 1
              fi
            done

            # ── 1. Record running container for rollback reference ────────────
            PREV_CONTAINER=$(docker compose -f docker-compose.prod.yml ps -q api 2>/dev/null | head -1 || true)
            PREV_IMAGE=$([ -n "$PREV_CONTAINER" ] && \
              docker inspect --format='{{.Config.Image}}' "$PREV_CONTAINER" 2>/dev/null || true)
            echo "Previous: ${PREV_IMAGE:-none}"
            echo "Deploying: $DEPLOY_IMAGE"

            # ── 2. Pull pinned, CI-signed image by digest ─────────────────────
            docker pull "$DEPLOY_IMAGE"

            # ── 3. Scale to 2: start new container alongside old ──────────────
            #    --no-recreate keeps the running container untouched.
            #    --scale api=2 adds a second instance with the new image.
            GHCR_IMAGE="$DEPLOY_IMAGE" \
              docker compose -f docker-compose.prod.yml up -d --scale api=2 --no-recreate api

            # ── 4. Identify the new container ─────────────────────────────────
            NEW_CONTAINER=$(docker compose -f docker-compose.prod.yml ps -q api \
              | grep -vxF "${PREV_CONTAINER:-}" | head -1 || true)
            if [ -z "$NEW_CONTAINER" ]; then
              echo "::error::Could not identify new container after scale-up."
              exit 1
            fi
            echo "New container: $NEW_CONTAINER"

            # ── 5. Wait up to 90 s for Docker healthcheck on new container ────
            for i in $(seq 1 18); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' "$NEW_CONTAINER" 2>/dev/null || echo "unknown")
              [ "$STATUS" = "healthy" ] && break
              echo "  Health.Status: $STATUS ($i/18)"
              sleep 5
            done
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' "$NEW_CONTAINER" 2>/dev/null || echo "failed")

            # ── 6a. Healthy: gracefully drain old, traffic shifts to new ──────
            if [ "$STATUS" = "healthy" ]; then
              if [ -n "${PREV_CONTAINER:-}" ]; then
                docker stop --time 30 "$PREV_CONTAINER"
                docker rm "$PREV_CONTAINER"
              fi
              echo "Deployment complete."
              exit 0
            fi

            # ── 6b. Unhealthy: remove new, old container keeps serving ────────
            echo "::error::New container unhealthy ($STATUS). Rolling back..."
            docker stop "$NEW_CONTAINER" 2>/dev/null || true
            docker rm  "$NEW_CONTAINER" 2>/dev/null || true
            echo "Rolled back — ${PREV_IMAGE:-original container} still running."
            exit 1

  fly-deploy:
    name: Deploy Fly edge
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - docker-images
      - image-security
      - deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    environment:
      name: production
    # Distinct from `hetzner-production` — Hetzner and Fly each get their own
    # concurrency group so the Fly deploy is not serialised against the
    # Hetzner deploy of an unrelated push.  Within Fly, deploys still
    # serialise (cancel-in-progress: false).
    concurrency:
      group: fly-production
      cancel-in-progress: false
    steps:
      - name: Check Fly secret availability
        id: fly-check
        shell: bash
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -z "${FLY_API_TOKEN}" ]; then
            echo "::warning::FLY_API_TOKEN not configured. Skipping Fly deploy."
            echo "available=false" >> "$GITHUB_OUTPUT"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        if: steps.fly-check.outputs.available == 'true'
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up flyctl
        if: steps.fly-check.outputs.available == 'true'
        uses: superfly/flyctl-actions/setup-flyctl@1.6

      # Deploy the digest-pinned edge image built and signed earlier in the
      # pipeline.  flyctl reads fly.toml from the working directory for app
      # config (vm size, region, http_service); --image overrides the
      # registry reference so we never re-build on a Fly remote builder.
      #
      # The image lives in GHCR — Fly machines must be able to pull it.
      # Either make ghcr.io/${owner}/cereveon public, or run
      # `flyctl auth docker` on the Fly side once with a GHCR PAT.  See
      # docs/DEPLOYMENT.md §"Fly.io edge" for the one-time setup.
      - name: Deploy edge image to Fly.io
        if: steps.fly-check.outputs.available == 'true'
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          DEPLOY_IMAGE: ghcr.io/${{ needs.docker-images.outputs.image_owner }}/${{ env.APP_IMAGE_NAME }}@${{ needs.docker-images.outputs.app_digest }}
        run: |
          echo "Deploying $DEPLOY_IMAGE to fly.io app 'chesscoach'"
          flyctl deploy --image "$DEPLOY_IMAGE" --app chesscoach

  llm-regression:
    name: LLM regression and smoke tests (Ollama)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            llm/requirements.txt
            llm/requirements-ci.txt
            pyproject.toml

      - name: Install CI dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r llm/requirements-ci.txt

      - name: Cache Ollama model weights
        uses: actions/cache@v5
        with:
          path: ~/.ollama/models
          key: ollama-qwen2.5-7b-instruct-q2_K-${{ runner.os }}

      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama server and wait for ready
        run: |
          ollama serve &
          for i in $(seq 1 30); do
            sleep 2
            if curl -sf http://127.0.0.1:11434/api/tags > /dev/null 2>&1; then
              echo "Ollama ready after $((i * 2))s"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "::error::Ollama did not start within 60s"
              exit 1
            fi
          done

      - name: Pull model (skipped when cache hit)
        run: ollama pull qwen2.5:7b-instruct-q2_K

      - name: Run LLM regression tests (RELEASE.md Step 3)
        env:
          RUN_OLLAMA_TESTS: "1"
        run: python -m pytest -q llm/rag/tests/llm/test_llm_regression.py

      - name: Run Ollama smoke test (RELEASE.md Step 4)
        env:
          RUN_OLLAMA_TESTS: "1"
        run: python -m pytest -q llm/rag/tests/llm/test_ollama_smoke.py

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs:
      - workflow-lint
      - python-tests
      - python-quality
      - dependency-security
      - node-security
      - docker-images
      - image-security
      - compose-validate
      - llm-regression
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Normalize image owner
        id: prep
        shell: bash
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            Container images published for this release:
            - `ghcr.io/${{ steps.prep.outputs.owner }}/${{ env.APP_IMAGE_NAME }}:${{ github.ref_name }}`
            - `ghcr.io/${{ steps.prep.outputs.owner }}/${{ env.API_IMAGE_NAME }}:${{ github.ref_name }}`
