# fly.toml app configuration file for the ChessCoach Fly.io edge tier.
#
# Deploys the `cereveon` image (root Dockerfile, llm/server.js — a
# small Node/Express front, port 3000) as the public-facing entry point
# distributed across Fly's regional edge.  The heavy Python FastAPI
# backend (`cereveon-llm-api`, port 8000) runs on Hetzner — see
# docs/DEPLOYMENT.md for the two-tier topology.
#
# CI updates this app via the `fly-deploy` job in
# .github/workflows/fly-deploy.yml on every push to main; manual deploys
# work the same way (`flyctl deploy --image <ghcr-ref>`).
#
# See https://fly.io/docs/reference/configuration/ for the full schema.

app = 'chesscoach'
primary_region = 'fra'

[build]

[http_service]
  internal_port = 3000
  force_https = true

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
